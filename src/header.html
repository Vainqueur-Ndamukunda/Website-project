<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baumeister - Modern Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f1eeec]">

<header class="w-full relative z-40">
    <nav class="flex justify-between items-start pt-5 px-5 md:p-12 md:pb-5 lg:px-10 lg:py-5">

        <div class="w-10 lg:w-1/3 text-[10px] md:text-sm lg:text-base font-semibold uppercase flex flex-col gap-0.5">
            <span>DE</span>
            <span >EN</span>
        </div>

        <h1 class="text-center text-2xl md:text-4xl lg:text-[2.75rem] lg:w-1/3 font-extrabold tracking-tighter">
            Baumeister
        </h1>

        <button id="menuBtn"
            class="w-10 flex justify-end bg-black text-white p-2 rounded md:bg-transparent md:text-black lg:hidden"
            aria-expanded="false">
            <svg class="w-6 h-6" viewBox="0 0 24 20" stroke="currentColor" fill="none" stroke-width="2.5">
                <line x1="0" y1="3" x2="24" y2="3" />
                <line x1="0" y1="10" x2="24" y2="10" />
                <line x1="0" y1="17" x2="24" y2="17" />
            </svg>
        </button>

        <div id="mobileMenu"
            class="hidden absolute right-5 top-20 bg-[#f1eeec] text-lg font-medium flex-col items-end gap-1.5 lg:static lg:flex lg:bg-transparent">
            <a href="#">About Us</a>
            <a href="#">Our Services</a>
            <a href="#">Project Portfolio</a>
            <a href="#">Get in Touch</a>
        </div>

    </nav>
</header>

</html>
