<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baumeister - Modern Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet"> 
    <style>
      body { font-family: 'Inter', sans-serif; }
      
      .jagged-menu {
        
        clip-path: polygon(8% 18%, 82% 10%, 100% 48%, 80% 92%, 18% 95%, 4% 52%);
      }

    </style>
  </head>
  <body class="bg-white font-[Regular]">
    <header class="w-full">
      <div class="flex justify-between items-center px-6 md:px-10 relative h-20 md:h-32">
        
        <div class="text-[11px] md:text-[13px] font-medium leading-tight">
          <div class="font-bold">DE</div>
          <div class="font-bold">EN</div>
        </div>

        <div class="absolute left-1/2 transform -translate-x-1/2">
          <h1 class="text-xl md:text-4xl font-bold tracking-tight text-black">
            Baumeister
          </h1>
        </div>

        <nav class="hidden md:block text-right text-[15px] font-medium leading-[1.3]">
          <a href="index.html" class="block hover:opacity-60">About</a>
          <a href="index.html" class="block hover:opacity-60">Services</a>
          <a href="index.html" class="block hover:opacity-60">References</a>
          <a href="index1.html" class="block hover:opacity-60">Contact</a>
        </nav>

        <button
          class="md:hidden jagged-menu bg-black text-white w-[70px] h-[55px] flex flex-col gap-[5px] items-center justify-center active:scale-95 transition-all"
        >
          <span class="w-8 h-[3px] bg-white"></span>
          <span class="w-8 h-[3px] bg-white"></span>
          <span class="w-8 h-[3px] bg-white"></span>
        </button>

      </div>
    </header>
  </body>
</html>
